<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#0b1120"/>

  <!-- Tree/graph structure matching the logo's left side -->
  <!-- Root node -->
  <circle cx="16" cy="6" r="3" fill="#3b82f6"/>

  <!-- Edges from root to children -->
  <line x1="16" y1="9" x2="8" y2="16" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="9" x2="24" y2="16" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left child -->
  <circle cx="8" cy="18" r="3" fill="#3b82f6"/>
  <!-- Right child -->
  <circle cx="24" cy="18" r="3" fill="#3b82f6"/>

  <!-- Edges to leaf nodes -->
  <line x1="8" y1="21" x2="5" y2="25" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="21" x2="12" y2="25" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="21" x2="21" y2="25" stroke="#4a9eff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Leaf nodes -->
  <circle cx="5" cy="27" r="2.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <circle cx="12" cy="27" r="2.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <circle cx="21" cy="27" r="2.5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
</svg>
